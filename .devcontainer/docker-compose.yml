services:
  backend:
    build:
      context: ..
      dockerfile: .devcontainer/Dockerfile
    volumes:
      - ..:/workspace:cached
    command: /workspace/.devcontainer/start-with-proxy.sh
    ports:
      - "8080:8080"
      - "5433:5432"  # Proxy port for postgres (connect to localhost:5433 from host)
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://timesplace:timesplace@postgres:5432/timesplace?sslmode=disable

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    volumes:
      - postgres-data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: timesplace
      POSTGRES_PASSWORD: timesplace
      POSTGRES_DB: timesplace
      POSTGRES_HOST_AUTH_METHOD: trust
    command: ["postgres", "-c", "listen_addresses=*"]
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U timesplace"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
