# CI: build and test backend + frontend before deployment (e.g. Render.com).
# Runs on every push to main and on pull requests.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: timesplace
          POSTGRES_PASSWORD: timesplace
          POSTGRES_DB: timesplace
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # --- Backend ---
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.5"

      - name: Backend dependencies
        run: cd backend && go mod download

      - name: Install goose
        run: go install github.com/pressly/goose/v3/cmd/goose@latest

      - name: Run migrations
        env:
          DATABASE_URL: postgres://timesplace:timesplace@localhost:5432/timesplace?sslmode=disable
        run: |
          cd backend
          goose -dir db/migrations postgres "$DATABASE_URL" up

      - name: Backend tests
        env:
          DATABASE_URL: postgres://timesplace:timesplace@localhost:5432/timesplace?sslmode=disable
          TEST_DATABASE_URL: postgres://timesplace:timesplace@localhost:5432/timesplace?sslmode=disable
        run: |
          cd backend
          go test ./... -v

      - name: Backend tests (coverage)
        env:
          DATABASE_URL: postgres://timesplace:timesplace@localhost:5432/timesplace?sslmode=disable
          TEST_DATABASE_URL: postgres://timesplace:timesplace@localhost:5432/timesplace?sslmode=disable
        run: |
          cd backend
          go test ./... -coverprofile=coverage.out

      - name: Upload backend coverage
        uses: codecov/codecov-action@v4
        with:
          file: ./backend/coverage.out
          flags: backend
          name: backend-coverage
        continue-on-error: true

      # --- Frontend ---
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Frontend dependencies
        run: cd frontend && npm ci

      - name: Frontend build
        run: cd frontend && npm run build

  # ---------------------------------------------------------------------------
  # Deploy job (commented out): Render is set to "Deploy only when CI passes",
  # so it watches GitHub commit status and deploys when this workflow succeeds.
  # No deploy-hook call is needed. Uncomment below if you switch to manual or
  # webhook-only deploys and want the workflow to trigger Render via deploy hook
  # (and set RENDER_DEPLOY_HOOK_URL in repo Secrets).
